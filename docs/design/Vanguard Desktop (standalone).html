document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 --popover-foreground: oklch(0.145 0 0);\n\n  /* -------- Neutral palette -------- */\n  --secondary: oklch(0.97 0 0);\n  --secondary-foreground: oklch(0.205 0 0);\n  --muted: oklch(0.97 0 0);\n  --muted-foreground: oklch(0.556 0 0);\n  --accent: oklch(0.97 0 0);\n  --accent-foreground: oklch(0.205 0 0);\n\n  /* -------- Utility -------- */\n  --border: oklch(0.922 0 0);\n  --input: oklch(0.922 0 0);\n  --ring: oklch(0.708 0 0);\n  --radius: 0.625rem; /* 10px base */\n\n  /* -------- Chart colors -------- */\n  --chart-1: oklch(0.646 0.222 41.116);\n  --chart-2: oklch(0.6 0.118 184.704);\n  --chart-3: oklch(0.398 0.07 227.392);\n  --chart-4: oklch(0.828 0.189 84.429);\n  --chart-5: oklch(0.769 0.188 70.08);\n\n  /* -------- Radius scale -------- */\n  --radius-sm: calc(var(--radius) - 4px); /* 6  */\n  --radius-md: calc(var(--radius) - 2px); /* 8  */\n  --radius-lg: var(--radius);             /* 10 */\n  --radius-xl: calc(var(--radius) + 4px); /* 14 */\n\n  /* -------- Typography -------- */\n  --font-sans: \"Manrope\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif;\n  --font-mono: \"Fira Code\", ui-monospace, \"SFMono-Regular\", Menlo, Consolas, monospace;\n\n  /* -------- Easing curves -------- */\n  --ease-fluid: cubic-bezier(0.3, 0, 0, 1);\n  --ease-snappy: cubic-bezier(0.2, 0, 0, 1);\n  --ease-micro: cubic-bezier(0.4, 0, 0.2, 1);\n\n  /* -------- Component sizing -------- */\n  --spacing-ui-height: 35px;\n  --spacing-ui-icon-height: calc(var(--spacing-ui-height) * 0.5);\n\n  /* -------- Z-index layers -------- */\n  --z-index-base: 0;\n  --z-index-dropdowns: 200;\n  --z-index-tooltips: 400;\n  --z-index-overlays: 500;\n  --z-index-drawers: 600;\n  --z-index-modals: 700;\n  --z-index-notifications: 800;\n  --z-index-toasts: 810;\n}\n\n.dark {\n  --background: oklch(0.145 0 0);\n  --foreground: oklch(0.985 0 0);\n  --card: oklch(0.145 0 0);\n  --card-foreground: oklch(0.985 0 0);\n  --popover: oklch(0.145 0 0);\n  --popover-foreground: oklch(0.985 0 0);\n\n  --secondary: oklch(0.269 0 0);\n  --secondary-foreground: oklch(0.985 0 0);\n  --muted: oklch(0.269 0 0);\n  --muted-foreground: oklch(0.708 0 0);\n  --accent: oklch(0.269 0 0);\n  --accent-foreground: oklch(0.985 0 0);\n\n  --border: oklch(0.269 0 0);\n  --input: oklch(0.269 0 0);\n  --ring: oklch(0.556 0 0);\n\n  --chart-1: oklch(0.488 0.243 264.376);\n  --chart-2: oklch(0.696 0.17 162.48);\n  --chart-3: oklch(0.769 0.188 70.08);\n  --chart-4: oklch(0.627 0.265 303.9);\n  --chart-5: oklch(0.645 0.246 16.439);\n}\n\n/* ============================================================\n   Semantic type scale — maps HTML tags to system typography.\n   ============================================================ */\nhtml, body {\n  font-family: var(--font-sans);\n  color: var(--foreground);\n  background: var(--background);\n  font-feature-settings: \"ss01\", \"cv11\"; /* Manrope stylistic sets */\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Display & headings — Title Case, tight tracking, semibold */\n.display {\n  font-family: var(--font-sans);\n  font-size: 3.5rem;     /* 56px */\n  line-height: 1.05;\n  font-weight: 700;\n  letter-spacing: -0.025em;\n}\nh1, .h1 {\n  font-family: var(--font-sans);\n  font-size: 2.25rem;    /* 36 */\n  line-height: 1.15;\n  font-weight: 700;\n  letter-spacing: -0.02em;\n}\nh2, .h2 {\n  font-size: 1.5rem;     /* 24 */\n  line-height: 1.25;\n  font-weight: 600;\n  letter-spacing: -0.015em;\n}\nh3, .h3 {\n  font-size: 1.25rem;    /* 20 */\n  line-height: 1.3;\n  font-weight: 600;\n  letter-spacing: -0.01em;\n}\nh4, .h4 {\n  font-size: 1.125rem;   /* 18 */\n  line-height: 1.35;\n  font-weight: 600;\n}\n/* Card title – exact rule from Card.tsx */\n.card-title {\n  font-size: 1.125rem;   /* 18 */\n  font-weight: 600;\n  line-height: 1;        /* leading-none */\n  letter-spacing: -0.02em;\n}\n\n/* Body */\n.body, p {\n  font-size: 0.875rem;   /* 14 — the component-library baseline */\n  line-height: 1.5;\n}\n.body-lg {\n  font-size: 1rem;       /* 16 */\n  line-height: 1.55;\n}\n.body-sm {\n  font-size: 0.8125rem;  /* 13 */\n  line-height: 1.45;\n}\n\n/* Small / label / overline */\n.label {\n  font-size: 0.875rem;\n  font-weight: 500;\n  line-height: 1;\n}\n.small {\n  font-size: 0.75rem;    /* 12 */\n  line-height: 1.35;\n}\n.muted {\n  color: var(--muted-foreground);\n}\n\n/* Code / tabular */\ncode, kbd, samp, pre, .mono {\n  font-family: var(--font-mono);\n  font-size: 0.8125rem;\n  font-feature-settings: \"calt\", \"liga\", \"zero\";\n}\n\n/* Link default — primary-tinted, no underline, underline on hover */\na {\n  color: var(--primary);\n  text-decoration: none;\n  transition: opacity 300ms var(--ease-micro);\n}\na:hover { text-decoration: underline; }\na:focus-visible {\n  outline: 2px solid var(--ring);\n  outline-offset: 2px;\n  border-radius: var(--radius-sm);\n}\n\n/* Shared micro-interactions utility (from theme.css) */\n.micro-interactions {\n  transition: all 300ms var(--ease-micro);\n}\n<\u002Fstyle>\n  <script src=\"bf333782-6223-437f-a20a-4408d8140069\"><\u002Fscript>\n  <script src=\"3f72dd72-1c8d-4acc-b159-348cf3d5f95a\"><\u002Fscript>\n  <style>\n    html, body { margin: 0; height: 100%; font-family: var(--font-sans), sans-serif !important; background: var(--background); color: var(--foreground); }\n    a { color: var(--primary); }\n    a:hover { text-decoration: underline; }\n    @keyframes vg-pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }\n    @keyframes vg-fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }\n    @keyframes vg-shimmer { 0% { opacity: .55; } 50% { opacity: 1; } 100% { opacity: .55; } }\n    @keyframes vg-spin { to { transform: rotate(360deg); } }\n    ::-webkit-scrollbar { width: 10px; height: 10px; }\n    ::-webkit-scrollbar-thumb { background: color-mix(in oklch, var(--muted-foreground) 25%, transparent); border-radius: 5px; border: 2px solid tran -linejoin=\"round\"><rect width=\"12\" height=\"12\" x=\"6\" y=\"6\" rx=\"1\"><\u002Frect><\u002Fsvg>\n                Kill\n              <\u002Fx-import>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- error banner -->\n          <sc-if value=\"{{ lrError }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin: 0 20px 10px; border: 1px solid color-mix(in oklch, var(--destructive) 40%, transparent); background: color-mix(in oklch, var(--destructive) 10%, transparent); color: var(--destructive); border-radius: 8px; padding: 8px 12px; font-size: 13px;\">Stream disconnected — process may have exited. Reload to reattach.<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- three-pane body -->\n          <div style=\"flex: 1; display: flex; gap: 12px; min-height: 0; padding: 0 20px;\">\n            <!-- center: live transcript -->\n            <div style=\"flex: 1.4; display: flex; flex-direction: column; min-width: 0; border: 1px solid var(--border); border-radius: 12px; background: color-mix(in oklch, var(--muted) 30%, var(--background)); overflow: hidden;\">\n              <div style=\"flex: none; padding: 8px 14px; border-bottom: 1px solid var(--border); font: 600 10.5px var(--font-mono); letter-spacing: .07em; text-transform: uppercase; color: var(--muted-foreground);\">Agent transcript<\u002Fdiv>\n              <sc-if value=\"{{ lrWaiting }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--muted-foreground); font: 400 13px var(--font-sans);\">\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"animation: vg-spin 1s linear infinite;\"><circle cx=\"12\" cy=\"12\" r=\"10\" stroke=\"currentColor\" stroke-opacity=\"0.2\" stroke-width=\"3\"><\u002Fcircle><path d=\"M22 12a10 10 0 0 0-10-10\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u0 ground);\"><path d=\"M6 5v11\"><\u002Fpath><path d=\"M12 5v6\"><\u002Fpath><path d=\"M18 5v14\"><\u002Fpath><\u002Fsvg>\n              <div style=\"font: 600 14px var(--font-sans);\">No Tasks<\u002Fdiv>\n              <div style=\"font: 400 13px var(--font-sans); color: var(--muted-foreground);\">The configured Task Source returned no ready Tasks<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ bdShowColumns }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"flex: 1; overflow-x: auto; overflow-y: hidden; padding: 0 20px 16px; min-height: 0;\">\n              <div style=\"display: flex; gap: 10px; height: 100%; min-width: 1140px;\">\n                <sc-for list=\"{{ bdColumns }}\" as=\"col\" hint-placeholder-count=\"6\">\n                  <div style=\"flex: 1; min-width: 178px; display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 12px; background: color-mix(in oklch, var(--muted) 35%, var(--background)); overflow: hidden;\">\n                    <div style=\"flex: none; display: flex; align-items: center; gap: 7px; padding: 9px 12px; border-bottom: 1px solid var(--border);\">\n                      <sc-if value=\"{{ col.dot }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width: 7px; height: 7px; border-radius: 99px; background: var(--success); animation: vg-pulse 2s ease-in-out infinite;\"><\u002Fspan><\u002Fsc-if>\n                      <span style=\"font: 600 11px var(--font-mono); letter-spacing: .04em; color: {{ col.fg }};\">{{ col.label }}<\u002Fspan>\n                      <span style=\"font: 500 10.5px var(--font-mono); color: var(--muted-foreground); margin-left: auto;\">{{ col.count }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"flex: 1; overflow: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px;\">\n                      <sc-if value=\"{{ col.isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n y.spec.ts` \\u2014 lock it in with tests**\";\n    const implText = \"All changes are clean and tests pass. Here's what was done:\\n\\n**`apps/backend/src/ai/prompt-safety.ts`**\\n- Added `wrapCustomInstruction(s)`: sanitizes the input (strips `<user_style_preferences>` and `<untrusted_document>` tags to prevent break-out), then wraps it in delimiters with an explicit preamble limiting it to writing-style only.\\n- Added `looksLikeInjection(s)`: regex scan for common injection phrases \\u2014 returns a boolean for warn-only logging.\\n\\n**`apps/backend/src/ai/ai.service.ts`**\\n- CUSTOM depth no longer splices the raw instruction into the field spec. `depthPrompt` always uses `DEPTH_PROMPTS.BRIEF` as the base for CUSTOM; the custom instruction is appended as its own delimited block via `wrapCustomInstruction`, with a `logger.warn` if it looks like injection.\\n\\n**`apps/backend/src/ai/prompt-safety.spec.ts`**\\n- Added 6 new test cases. All 10 tests pass.\";\n    const advText = \"I've verified the diff against the actual files. The change is a defensive prompt-safety hardening for custom summary instructions. The sanitization correctly strips both `<user_style_preferences>` and `<untrusted_document>` delimiters \\u2014 the break-out defense is complete. API key handling is untouched; the new warn log emits only `ownerId`, never the instruction text or key. No critical/high issues. The residual findings are low-severity efficacy gaps in the warn-only detection.\";\n    const advFindings = \"- **low \\u00b7 security** \\u2014 Injection detection runs on the user's own instruction, not on the fetched content it calls \\u201cthe real prompt-injection vector\\u201d. `looksLikeInjection()` is only invoked on `customInstruction`; the genuinely untrusted input \\u2014 `item.extractedText` \\u2014 is never scanned. Defensible as warn-only defense-in-depth, but aimed at the lower-risk surface.\\n- **low \\u00b7 correctness** \\u2014 `INJECTION_RE` is trivially bypassed (high false-negative rate). Common phrasings miss: \\u201cignore the above\\u201d, \\u201cforget previous\\u201d, \\u201coverride the rules above\\u201d.\";\n    const repText = \"All 11 tests pass. Here's a summary of what changed:\\n\\n**`prompt-safety.ts`** \\u2014 `INJECTION_RE` rewritten as a structured regex array join:\\n- *Narrowed* `disregard` (now requires a target) \\u2014 fixes false positives like \\u201cdisregard minor typos\\u201d\\n- *Added* `ignore the above`, `forget previous/everything`, `override the rules/instructions` \\u2014 fills the false-negative gap\\n\\n**`prompt-safety.spec.ts`** \\u2014 added 10 new injection-phrase assertions and 4 benign-phrase assertions.\\n\\n**`ai.service.ts`** \\u2014 added `looksLikeInjection(item.extractedText)` warn log so the genuinely untrusted surface (fetched web content) is also scanned.\";\n    return [\n      { name: \"planner\", exitReason: \"completed\", chipColor: \"success\", meta: \"1 turn \\u00b7 157s \\u00b7 2.8k in / 4.9k out \\u00b7 96.6% cache \\u00b7 $0.48 \\u00b7 claude-opus-4-8\", segments: [this.seg(\"plan\", plannerPlan)] },\n      { name: \"implementer\", exitReason: \"completed\", chipColor: \"success\", meta: \"10 turns \\u00b7 122s \\u00b7 21 in / 5.4k out \\u00b7 99.9% cache \\u00b7 $0.44 \\u00b7 claude-sonnet-4-6\", segments: [this.seg(\"text\", implText), this.seg(\"promise\", \"COMPLETE\")] },\n      { name: \"adversary\", exitReason: \"completed\", chipColor: \"success\", meta: \"2 turns \\u00b7 73s \\u00b7 2.8k in / 5.1k out \\u00b7 93.5% cache \\u00b7 $0.30 \\u00b7 claude-opus-4-8\", segments: [this.seg(\"text\", advText), this.seg(\"findings\", advFindings)] },\n      { name: \"repairer\", exitReason: \"completed\", chipColor: \"success\", meta: \"7 turns \\u00b7 178s \\u00b7 9 in / 11.4k out \\u00b7 99.9% cache \\u00b7 $0.36 \\u00b7 claude-sonnet-4-6\", segments: [this.seg(\"text\", repText), this.seg(\"promise\", \"COMPLETE\")] },\n    ];\n  }\n\n  get diffText() {\n    return [
