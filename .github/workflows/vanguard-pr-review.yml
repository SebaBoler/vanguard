name: Vanguard PR Review

on:
  pull_request_target:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: vanguard-pr-review-${{ github.repository }}
  cancel-in-progress: false

jobs:
  review:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'ready for vanguard review' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login == 'SebaBoler')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Build sandbox image
        run: docker build -t vanguard-sandbox:latest docker/

      - name: Ensure routing labels
        run: |
          gh label create "ready for vanguard review" --repo "$GITHUB_REPOSITORY" --color BFD4F2 --description "Trigger a Vanguard PR review" --force
          gh label create "vanguard:reviewing" --repo "$GITHUB_REPOSITORY" --color FBCA04 --description "Vanguard PR review in progress" --force
          gh label create "vanguard:reviewed" --repo "$GITHUB_REPOSITORY" --color 0E8A16 --description "Vanguard PR review posted" --force

      - name: Preflight
        run: node dist/cli/index.js doctor-prs --github-repo "$GITHUB_REPOSITORY" --label "ready for vanguard review" --repo "$GITHUB_WORKSPACE"

      - name: Review labeled PRs
        run: node dist/cli/index.js watch-prs --once --github-repo "$GITHUB_REPOSITORY" --label "ready for vanguard review" --reviewing-label "vanguard:reviewing" --reviewed-label "vanguard:reviewed" --author SebaBoler --repo "$GITHUB_WORKSPACE" --llm-proxy
