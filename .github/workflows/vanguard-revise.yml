name: Vanguard Revise
on:
  pull_request_target:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr: { description: "PR number", required: true }
permissions:
  contents: write          # pushes the revision commit to the PR branch
  pull-requests: write     # reply, resolve threads, gh pr ready
  issues: write
concurrency:
  group: vanguard-revise-${{ github.repository }}
  cancel-in-progress: false
jobs:
  revise:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'needs revision' &&
       contains(fromJSON('["SebaBoler","github-actions[bot]"]'), github.event.pull_request.user.login) &&
       github.event.sender.login == 'SebaBoler')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      # PAT for revision pushes: GITHUB_TOKEN events fire no workflows (recursion guard), so
      # revised PRs would never get CI and stay BLOCKED under branch protection (#256).
      VANGUARD_PUSH_TOKEN: ${{ secrets.VANGUARD_PUSH_TOKEN }}
    steps:
      # Check out the DEFAULT branch (trusted) so the revise tool is always main's version, not the
      # PR-under-revision's code — which may lack the command or be untrusted (pull_request_target).
      # revise-pr itself does `git fetch origin <head>` + a worktree, so it operates on the PR branch.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0          # the runner fetches the PR branch and pushes back to it
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm build
      - name: Build sandbox image
        run: docker build -t vanguard-sandbox:latest docker/
      - name: Ensure routing labels
        run: |
          gh label create "needs revision" --repo "$GITHUB_REPOSITORY" --color E99695 --force
          gh label create "vanguard:revising" --repo "$GITHUB_REPOSITORY" --color C5DEF5 --force
      - name: Revise the PR from review comments
        env:
          PR: ${{ github.event.pull_request.number || inputs.pr }}
        run: |
          node dist/cli/index.js revise-pr "$PR" \
            --github-repo "$GITHUB_REPOSITORY" --max-rounds 2 --llm-proxy
