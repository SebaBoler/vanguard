name: Vanguard Implement

# Loop v1 from GitHub Actions:
#   "ready for spec"  -> plan, then build it in the same run
#   "ready for agent" -> build directly
#   too vague         -> "needs info" (human fills it in)
#
# A single `watch --once`: the spec pass advances a ticket to "ready for agent" and the agent pass
# builds it in the same invocation (carries the just-advanced id in memory, so it no longer depends on
# GitHub's eventually-consistent label index — see #143). No second sweep needed.
#
# Requires repo setting: Settings > Actions > General > Workflow permissions >
# "Allow GitHub Actions to create and approve pull requests" (otherwise the
# agent's PR fails with "GitHub Actions is not permitted to create ... pull requests").

on:
  issues:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: vanguard-implement-${{ github.repository }}
  cancel-in-progress: false

jobs:
  implement:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.actor == 'SebaBoler') ||
      (github.event_name == 'issues' &&
      contains(fromJSON('["ready for spec","ready for agent"]'), github.event.label.name) &&
      github.event.issue.user.login == 'SebaBoler' &&
      github.event.sender.login == 'SebaBoler')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Build sandbox image
        run: docker build -t vanguard-sandbox:latest docker/

      - name: Ensure routing labels
        run: |
          gh label create "ready for spec" --repo "$GITHUB_REPOSITORY" --color FBCA04 --description "Vanguard Loop v1 spec pass" --force
          gh label create "ready for agent" --repo "$GITHUB_REPOSITORY" --color 5319E7 --description "Vanguard Loop v1 agent pass" --force
          gh label create "needs info" --repo "$GITHUB_REPOSITORY" --color D93F0B --description "Parked: ticket too vague for Vanguard" --force
          gh label create "vanguard:speccing" --repo "$GITHUB_REPOSITORY" --color FEF2C0 --description "Vanguard is writing a tech spec" --force
          gh label create "vanguard:running" --repo "$GITHUB_REPOSITORY" --color C5DEF5 --description "Vanguard agent is implementing" --force
          gh label create "vanguard:needs-human-review" --repo "$GITHUB_REPOSITORY" --color 0E8A16 --description "Vanguard opened a PR — awaiting human review" --force

      # Cross-provider self-review: Opus plans the spec, Sonnet implements, Codex reviews.
      # No --llm-proxy: Codex runs on a ChatGPT subscription (CODEX_AUTH_JSON), which talks to the
      # ChatGPT backend directly — the proxy allowlist only covers the api.openai.com (API-key) path.
      - name: Run Vanguard loop (Opus spec / Sonnet impl / Codex review)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          # One sweep: spec pass advances "ready for spec" -> "ready for agent", agent pass builds it in the same run (#143).
          node dist/cli/index.js watch --source github --github-repo "$GITHUB_REPOSITORY" --repo "$GITHUB_WORKSPACE" --once --skills ./skills --spec-model opus --provider claude --provider-model sonnet --review-provider codex
