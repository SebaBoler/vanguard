name: Vanguard Implement

# Label an issue "ready for agent" -> Vanguard implements it in a sandbox and
# opens a PR. The PR is then reviewed by vanguard-pr-review.yml.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue:
        description: Issue number to implement
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: vanguard-implement-${{ github.repository }}-${{ github.event.issue.number || github.event.inputs.issue }}
  cancel-in-progress: false

jobs:
  implement:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.actor == 'SebaBoler') ||
      (github.event_name == 'issues' &&
      github.event.label.name == 'ready for agent' &&
      github.event.issue.user.login == 'SebaBoler' &&
      github.event.sender.login == 'SebaBoler')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Build sandbox image
        run: docker build -t vanguard-sandbox:latest docker/

      - name: Ensure routing labels
        run: |
          gh label create "ready for spec" --repo "$GITHUB_REPOSITORY" --color FBCA04 --description "Vanguard Loop v1 spec pass" --force
          gh label create "ready for agent" --repo "$GITHUB_REPOSITORY" --color 5319E7 --description "Vanguard Loop v1 agent pass" --force
          gh label create "needs info" --repo "$GITHUB_REPOSITORY" --color D93F0B --description "Parked: ticket too vague for Vanguard" --force

      - name: Implement issue
        env:
          ISSUE: ${{ github.event.issue.number || github.event.inputs.issue }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: >-
          node dist/cli/index.js run
          --github "$ISSUE"
          --github-repo "$GITHUB_REPOSITORY"
          --repo "$GITHUB_WORKSPACE"
          --llm-proxy
