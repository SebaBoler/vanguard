name: Vanguard Research
on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue: { description: "issue number", required: true }
permissions:
  contents: read
  issues: write
concurrency:
  group: vanguard-research-${{ github.repository }}
  cancel-in-progress: false
jobs:
  research:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'needs research' &&
       contains(fromJSON('["SebaBoler","pawelkrystkiewicz"]'), github.event.issue.user.login) &&
       contains(fromJSON('["SebaBoler","pawelkrystkiewicz"]'), github.event.sender.login))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm build
      - name: Build sandbox image
        run: docker build -t vanguard-sandbox:latest docker/
      - name: Ensure routing labels
        run: |
          gh label create "needs research" --repo "$GITHUB_REPOSITORY" --color 1D76DB --force
          gh label create "vanguard:researching" --repo "$GITHUB_REPOSITORY" --color BFDADC --force
      - name: Research the issue
        env:
          ISSUE: ${{ github.event.issue.number || inputs.issue }}
        run: |
          node dist/cli/index.js research "$ISSUE" \
            --github-repo "$GITHUB_REPOSITORY" --provider claude
          # add --web ONLY if you have widened sandbox egress for web search (see the egress note above)
